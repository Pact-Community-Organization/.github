name: "Bug Report"
description: "Report a reproducible defect in a Pact Community project."
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please give us enough detail to reproduce it.
        **Do not report security vulnerabilities here** — use private reporting
        (see the Security Policy linked on the new-issue page).
  - type: input
    id: project
    attributes:
      label: Project / Repository
      placeholder: "e.g. pact-mcp"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: "Clear description of what's wrong."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. Run `...`
        2. Call `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: "e.g. v0.x.y, or commit SHA"
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Node/Pact version, network (devnet/testnet/mainnet)"
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (those are reported privately).
          required: true
